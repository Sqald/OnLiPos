services:
  rails:
    build:
      context: ./onlipos/
    environment:
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      HOST_NAME: ${HOST_NAME:-}
      FORCE_SSL: ${FORCE_SSL:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:${POSTGRES_DOCKER_VERSION}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres:/var/lib/postgresql/
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./nginx/
      args:
        - NGINX_DOCKER_VERSION=${NGINX_DOCKER_VERSION}
    volumes:
      - ./nginx/ssl:/ssl
      - ./onlipos/public:/rails/public:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      - postgres
      - rails

  backup:
    image: postgres:${POSTGRES_DOCKER_VERSION}
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          PGPASSWORD=$$(cat /run/secrets/db_password) pg_dump -h postgres -U ${DB_USER} ${DB_NAME} | gzip > /backup/onlipos_$$(date +%Y%m%d_%H%M%S).sql.gz
          find /backup -name '*.sql.gz' -mtime +30 -delete
          sleep 86400
        done
    volumes:
      - ./backups:/backup
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres:

secrets:
  db_password:
    file: ./secrets/db_password.txt